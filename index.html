<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>심인 차시 기록장</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="차시 기록장">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/lotus.png">
    <link rel="icon" href="https://img.icons8.com/color/512/lotus.png">

    <link rel="manifest" href='data:application/json,{"name":"심인 차시 기록장","short_name":"차시장","start_url":"index.html","display":"standalone","background_color":"#F8F7F2","theme_color":"#5D2A42","icons":[{"src":"https://img.icons8.com/color/512/lotus.png","sizes":"512x512","type":"image/png"}]}'>

    <style>
        :root {
            --jg-purple: #5D2A42;
            --jg-gold: #C5A059;
            --wood-dark: #3E2723;
            --bg-light: #F8F7F2;
            --ani-color: #FF5722; /* 애니메이션 숫자 색상 (주황계열로 눈에 띄게) */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-light);
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; color: var(--jg-purple);
            overflow-x: hidden;
        }

        header { padding: 25px 20px 10px; text-align: center; width: 100%; }
        header h1 { font-size: 1.5rem; margin: 5px 0; letter-spacing: 1px; font-weight: 800; }
        header p { font-size: 0.9rem; opacity: 0.7; margin: 0; }

        .container {
            width: 100%; max-width: 500px;
            display: flex; flex-direction: column; align-items: center;
            padding: 10px; gap: 15px;
        }

        .summary-card {
            width: 90%; background: white; padding: 18px;
            border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; justify-content: space-around; border: 1px solid #eee;
        }
        .summary-item { text-align: center; }
        .summary-item small { font-size: 0.75rem; display: block; margin-bottom: 5px; color: #888; }
        .summary-item b { font-size: 1.2rem; color: var(--jg-purple); }

        /* 저금통 영역 */
        .box-section { position: relative; padding: 40px 0; z-index: 10; }
        .shimine-box {
            width: 170px; height: 190px;
            background: var(--wood-dark);
            border: 4px solid var(--jg-gold);
            border-radius: 12px;
            position: relative;
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; align-items: center;
        }
        .slot {
            width: 85px; height: 7px;
            background: #1a1110; margin-top: 30px; border-radius: 4px;
        }
        .lotus-icon {
            margin-top: 25px; width: 65px; height: 65px;
            background-color: var(--jg-gold);
            -webkit-mask: url('https://www.svgrepo.com/show/397390/lotus.svg') no-repeat center;
            mask: url('https://www.svgrepo.com/show/397390/lotus.svg') no-repeat center;
            -webkit-mask-size: contain; mask-size: contain;
        }
        .box-text {
            position: absolute; bottom: 15px; color: var(--jg-gold);
            font-size: 0.85rem; border: 1px solid var(--jg-gold); padding: 3px 10px;
        }

        /* 입력 및 버튼 */
        .input-area { width: 90%; display: flex; flex-direction: column; gap: 12px; }
        #memo-input {
            width: 100%; padding: 14px; border: 1px solid #ddd;
            border-radius: 10px; font-size: 1rem; outline: none;
        }

        .money-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        .btn-money {
            padding: 15px 5px; border: 1px solid #eee; border-radius: 10px;
            font-weight: bold; font-size: 0.9rem; cursor: pointer;
            transition: all 0.2s; background: white;
        }
        .btn-money:active { transform: scale(0.92); background: #f0f0f0; }
        .btn-coin { background: #fafafa; }
        .btn-1000 { background: #E8F5E9; color: #2E7D32; }
        
        /* 커스텀 버튼 스타일 */
        .btn-custom { 
            background: var(--jg-purple); color: white; border: none; 
            position: relative; overflow: hidden;
        }
        .edit-tip { font-size: 0.6rem; display: block; opacity: 0.7; font-weight: normal; }

        .history-section { width: 90%; margin-top: 10px; margin-bottom: 60px; }
        .history-title { font-size: 1.1rem; margin-bottom: 12px; display: block; border-bottom: 2px solid var(--jg-gold); padding-bottom: 8px; font-weight: bold; }
        .history-list { list-style: none; padding: 0; margin: 0; }
        .history-item {
            background: white; margin-bottom: 10px; padding: 15px;
            border-radius: 12px; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        /* 애니메이션 숫자: 저금통 위로 올라가게 조정 */
        .ani-money {
            position: absolute; pointer-events: none; z-index: 999;
            transition: all 0.8s ease-out;
            font-weight: 900; color: var(--ani-color); 
            font-size: 1.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<header>
    <p>나의 일상 수행 기록</p>
    <h1>차시(差施) 기록장</h1>
</header>

<div class="container">
    <div class="summary-card">
        <div class="summary-item">
            <small>오늘 횟수</small>
            <b id="today-count">0</b>
        </div>
        <div class="summary-item">
            <small>누적 공덕액</small>
            <b id="total-amount">0</b>
        </div>
    </div>

    <div class="box-section" id="ani-container">
        <div class="shimine-box">
            <div class="slot"></div>
            <div class="lotus-icon"></div>
            <div class="box-text">차시함</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="memo-input" placeholder="어떤 마음으로 차시하시나요?" maxlength="20">
        <div class="money-grid">
            <button class="btn-money btn-coin" onclick="addChasi(10)">10</button>
            <button class="btn-money btn-coin" onclick="addChasi(100)">100</button>
            <button class="btn-money btn-coin" onclick="addChasi(500)">500</button>
            <button class="btn-money btn-1000" onclick="addChasi(1000)">1,000</button>
            <button class="btn-money btn-1000" onclick="addChasi(10000)">10,000</button>
            <button class="btn-money btn-custom" id="custom-btn">
                <span id="custom-text">금액 설정</span>
                <span class="edit-tip">길게 눌러 수정</span>
            </button>
        </div>
    </div>

    <div class="history-section">
        <span class="history-title">최근 수행 기록</span>
        <ul id="history-list" class="history-list"></ul>
        <button onclick="clearAll()" style="width:100%; background:none; border:none; color:#bbb; font-size:0.8rem; margin-top:30px; text-decoration:underline; cursor:pointer;">기록 전체 삭제</button>
    </div>
</div>

<script>
    let chasiLog = JSON.parse(localStorage.getItem('myChasiLog')) || [];
    let customAmount = localStorage.getItem('customChasiAmount') || null;

    function updateUI() {
        const total = chasiLog.reduce((sum, item) => sum + item.amount, 0);
        const todayStr = new Date().toLocaleDateString();
        const todayCount = chasiLog.filter(item => new Date(item.timestamp).toLocaleDateString() === todayStr).length;

        document.getElementById('total-amount').innerText = total.toLocaleString() + "원";
        document.getElementById('today-count').innerText = todayCount + "회";

        const customText = document.getElementById('custom-text');
        customText.innerText = customAmount ? parseInt(customAmount).toLocaleString() : "금액 설정";

        const listHtml = chasiLog.slice().reverse().slice(0, 10).map(item => `
            <li class="history-item">
                <div class="history-info">
                    <b>${item.amount.toLocaleString()}원 차시</b>
                    <span class="history-memo">${item.memo || '일념(一念)으로 바칩니다'}</span>
                    <span class="history-date">${new Date(item.timestamp).toLocaleString()}</span>
                </div>
                <div style="color: var(--jg-gold); font-size: 1.5rem;">🙏</div>
            </li>
        `).join('');
